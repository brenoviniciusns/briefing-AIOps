api_sources:
  # API oficial Hacker News (Firebase); sem chave; uso moderado (ex.: até ~120 pedidos GET/dia no nó).
  - id: hackernews-firebase
    source: hackernews
    kind: rest_json
    base_url: https://hacker-news.firebaseio.com/v0
    endpoints:
      list_ids: /newstories.json
      item: /item/{id}.json
    docs: https://github.com/HackerNews/API
    notes: >
      Histórias com campo time (Unix) mapeadas para published_at UTC;
      Ask HN / sem URL externa usam https://news.ycombinator.com/item?id={id}.
      idempotência continua a ser SHA256(URL) do artigo ou página HN.
